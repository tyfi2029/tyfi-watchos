name: Build Check (watchOS Simulator)
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        sudo xcode-select -s "$XCODE/Contents/Developer"
        xcodebuild -version

    - name: Install xcodegen
      run: brew install xcodegen

    - name: Generate project
      run: xcodegen generate --spec project.yml --project .

    - name: Build TyFiWatch (watchOS Simulator)
      run: |
        set -o pipefail
        xcodebuild \
          -scheme TyFiWatch \
          -destination 'generic/platform=watchOS Simulator' \
          -project TyFiWatch.xcodeproj \
          CODE_SIGNING_ALLOWED=NO \
          build \
          2>&1 | grep -E "error:|BUILD FAILED|BUILD SUCCEEDED|warning:.*error" | head -60
