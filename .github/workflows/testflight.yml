name: Build & Upload to TestFlight
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  regen-xcodeproj:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Regenerate xcodeproj with automatic signing
      run: |
        which xcodegen || brew install xcodegen
        xcodegen generate
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add TyFiWatch.xcodeproj
        git diff --staged --stat
        git commit -m "chore: regenerate xcodeproj with automatic signing [skip ci]" || echo "No changes"
        git push || echo "Nothing to push"
