name: Build & Upload to TestFlight
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Install xcodegen
      run: brew install xcodegen
    - name: Build archive and upload to TestFlight
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        echo '' | base64 --decode > /tmp/tf.py
        python3 /tmp/tf.py
