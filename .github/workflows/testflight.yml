name: Build & Upload to TestFlight
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
    - name: Check Xcode Cloud via ASC API
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        pip install pyjwt cryptography --quiet --break-system-packages 2>/dev/null
        python3 /tmp/asc_check.py
    - name: Write ASC check script
      run: |
        cat > /tmp/asc_check.py << 'PYEOF'
import jwt, time, requests, json, os
KEY_ID = os.environ["KEY_ID"]
ISSUER = os.environ["ISSUER"]
with open("/tmp/asc_key.p8") as f:
    key_content = f.read()
payload = {"iss": ISSUER, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"}
token = jwt.encode(payload, key_content, algorithm="ES256", headers={"kid": KEY_ID})
H = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
r = requests.get("https://api.appstoreconnect.apple.com/v1/scmProviders", headers=H)
print(f"SCM Providers ({r.status_code}):", json.dumps(r.json(), indent=2)[:3000])
r2 = requests.get("https://api.appstoreconnect.apple.com/v1/ciProducts?filter[app]=6780694548", headers=H)
print(f"CI Products ({r2.status_code}):", json.dumps(r2.json(), indent=2)[:3000])
PYEOF
