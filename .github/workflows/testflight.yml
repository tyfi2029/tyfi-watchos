name: Build & Upload to TestFlight
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
    - name: Check Xcode Cloud status
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        echo '' | base64 --decode > /tmp/asc_check.py
        python3 /tmp/asc_check.py
