name: Build & Upload to TestFlight
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install xcodegen and regenerate project
      run: |
        brew install xcodegen
        xcodegen generate
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add TyFiWatch.xcodeproj
        git diff --staged --quiet || git commit -m "chore: regenerate xcodeproj manual signing [skip ci]"
        git push

    - name: Enable Xcode Cloud, trigger and poll build
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        echo '' | base64 --decode > /tmp/poll.py
        python3 /tmp/poll.py
