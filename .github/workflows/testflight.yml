name: Build & Upload to TestFlight
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate-and-commit:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Install xcodegen and generate xcodeproj
      run: |
        which xcodegen || brew install xcodegen
        xcodegen generate
        ls -la TyFiWatch.xcodeproj/
    - name: Remove xcodeproj from gitignore and commit
      run: |
        # Remove the gitignore entry for xcodeproj
        sed -i '' '/TyFiWatch.xcodeproj/d' .gitignore
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add TyFiWatch.xcodeproj .gitignore
        git status
        git diff --staged --stat
        git commit -m "feat: commit generated xcodeproj for Xcode Cloud [skip ci]"
        git push
