name: Build & Upload to TestFlight
on:
  workflow_dispatch:
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - name: Poll Xcode Cloud build
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        echo '' | base64 --decode > /tmp/asc_poll.py
        python3 /tmp/asc_poll.py
