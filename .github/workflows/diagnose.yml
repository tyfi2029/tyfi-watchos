name: Diagnose Xcode Cloud Build
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Get Xcode Cloud artifacts and log
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/asc_key.p8
        echo '' | base64 --decode > /tmp/diagnose.py
        python3 /tmp/diagnose.py
