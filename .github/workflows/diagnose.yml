name: Diagnose XC Build
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Download XC build logs
      env:
        KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: |
        echo "$KEY_B64" | base64 --decode > /tmp/k.p8
        echo '' | base64 --decode > /tmp/s.py
        python3 /tmp/s.py
