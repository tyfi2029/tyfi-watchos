name: TyFiWatch
options:
  bundleIdPrefix: fyi.tyfi.watch
  createIntermediateGroups: true
  deploymentTarget:
    watchOS: "11.5"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  TyFiWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.5"
    sources:
      - path: TyFiWatch
    info:
      path: TyFiWatch/Info.plist
      properties:
        CFBundleDisplayName: TyFi
        WKApplication: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.tyfi.watch.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: TyFi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
schemes:
  TyFiWatch:
    build:
      targets:
        TyFiWatch: all
    run:
      config: Debug
