name: TyFiWatch
options:
  bundleIdPrefix: fyi.tyfi.watch
  createIntermediateGroups: true
  deploymentTarget:
    watchOS: "11.5"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "E5HE9TGHFQ"
targets:
  TyFiWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.5"
    sources:
      - path: TyFiWatch
    info:
      path: TyFiWatch/Info.plist
      properties:
        CFBundleDisplayName: TyFi
        WKApplication: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "TyFi reads your health data to display readiness, sleep, and activity metrics."
        NSHealthUpdateUsageDescription: "TyFi writes workout and breathing session data to Health."
    entitlements:
      path: TyFiWatch/TyFiWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.tyfi.watch.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: TyFi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "TyFiWatch WatchOS AppStore"
        DEVELOPMENT_TEAM: "E5HE9TGHFQ"
  TyFiWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.5"
    sources:
      - path: TyFiWatchComplications
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.tyfi.watch.complications
        INFOPLIST_EXTENSION_POINT_IDENTIFIER: com.apple.widgetkit-extension
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "E5HE9TGHFQ"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "TyFiWatch Complications WatchOS AppStore"
    dependencies:
      - target: TyFiWatch
  TyFiWatchTests:
    # Host-less logic-test bundle: standalone watchOS apps cannot host unit tests
    # via `xcodebuild test` (install path misclassifies them as WatchKit 2.0 needing
    # a companion). We compile the model layer directly into the test bundle instead
    # of @testable-importing the app, so no host install is required.
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "11.5"
    sources:
      - path: TyFiWatchTests
      - path: TyFiWatch/Models/Models.swift
      - path: TyFiWatch/Services/API.swift
      - path: TyFiWatch/Services/WatchAuth.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.tyfi.watch.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "E5HE9TGHFQ"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "TyFiWatch WatchOS AppStore"
schemes:
  TyFiWatch:
    build:
      targets:
        TyFiWatch: all
        TyFiWatchComplications: all
    test:
      config: Debug
      targets:
        - TyFiWatchTests
    run:
      config: Debug
